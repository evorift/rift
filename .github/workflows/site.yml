name: Deploy site to GitHub Pages

# Cloudflare Pages kullanıyorsan bu workflow gerekmez (Cloudflare repoyu kendi build eder).
# GitHub Pages yedeği: site/ değişince build edip /rift alt-klasörüne yayınlar.

on:
  # Cloudflare Pages kullanıldığı için otomatik tetik KAPALI (yoksa Pages kurulu değilken hata verir).
  # GitHub Pages'e geçersen Settings → Pages → Source: GitHub Actions yap, sonra elle çalıştır.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /rift
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
