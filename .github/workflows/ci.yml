name: CI

# evorift CI — Windows-only (birim testleri + winws/WARP bundle Windows hedefli).
# Quality gate: fmt → clippy → cargo test → svelte-check → cargo audit → cargo deny → npm audit.

on:
  push:
  pull_request:

# Aynı ref için yeni push gelince önceki çalışmayı iptal et.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit + cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # --- Quality gates ---

      # Kod elle (kompakt) biçimlendirilmiş; rustfmt'i ZORLAMA. Advisory: drift'i
      # annotation olarak gösterir ama CI'ı kırmaz. Tüm repo `cargo fmt` ile
      # biçimlendirildiğinde continue-on-error'ı kaldırıp blocking yapabilirsin.
      - name: cargo fmt (advisory)
        working-directory: ./src-tauri
        continue-on-error: true
        run: cargo fmt --all --check

      # -D warnings gerçek bug'ları bloklar. -A ...: kod tabanında MEVCUT 3 stil/doc
      # lint'i (yeni clippy sürümünün yakaladığı; engine'in kasıtlı karmaşık tipi +
      # Türkçe doc-comment formatı + bir accept döngüsü) advisory bırakır — test edilen
      # engine'e dokunmadan CI yeşil kalır. İleride düzeltip bu -A'ları kaldırabilirsin.
      - name: cargo clippy (-D warnings)
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings -A clippy::doc_lazy_continuation -A clippy::type_complexity -A clippy::while_let_loop

      - name: cargo test
        working-directory: ./src-tauri
        run: cargo test

      # svelte-check: BlackHole.svelte (ayrı geliştirilen WIP) @types/three eksikliğiyle
      # 1 hata veriyor — CLAUDE.md'ye göre BEKLENEN/alakasız; bizim dosyalarımızda 0 hata.
      # Advisory bırak (CI'ı kırmaz); BlackHole three tipleri çözülünce blocking yapılır.
      - name: svelte-check (advisory)
        continue-on-error: true
        run: npm run check

      - name: cargo audit
        working-directory: ./src-tauri
        run: cargo audit

      - name: cargo deny
        working-directory: ./src-tauri
        # deny.toml repo kökünde; manifest src-tauri'de. --config ile köke işaret et.
        run: cargo deny --manifest-path Cargo.toml --config ../deny.toml check

      - name: npm audit
        run: npm audit --omit=dev
